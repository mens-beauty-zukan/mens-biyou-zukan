<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メンズ美容図鑑｜化粧水完全比較</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0b;
  --bg2:#141412;
  --bg3:#1c1c19;
  --border:#2a2a26;
  --green:#3dd68c;
  --green-dim:#1a5c3a;
  --green-bg:#0d2b1c;
  --red:#f05a5a;
  --red-bg:#2b0f0f;
  --amber:#f0b43a;
  --amber-bg:#2b1f0a;
  --text:#e8e6de;
  --text2:#9a9890;
  --text3:#5a5a54;
  --accent:#3dd68c;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;line-height:1.6;}
a{color:inherit;text-decoration:none;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(13,13,11,.92);backdrop-filter:blur(12px);z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.05em;color:var(--green);}
.logo span{color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;font-weight:400;margin-left:8px;opacity:.6;}
.nav-links{display:flex;gap:20px;font-size:12px;color:var(--text2);}
.nav-links a:hover{color:var(--text);}

/* HERO */
.hero{padding:60px 24px 40px;max-width:900px;margin:0 auto;text-align:center;}
.hero-eyebrow{font-size:11px;letter-spacing:.15em;color:var(--green);text-transform:uppercase;margin-bottom:16px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,72px);line-height:1.05;letter-spacing:.02em;margin-bottom:16px;}
.hero-title em{color:var(--green);font-style:normal;}
.hero-sub{font-size:14px;color:var(--text2);max-width:480px;margin:0 auto 32px;line-height:1.8;}
.hero-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;}
.hbadge{font-size:11px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);color:var(--text2);}
.hbadge.active{border-color:var(--green);color:var(--green);background:var(--green-bg);}

/* FILTER BAR */
.filter-wrap{max-width:900px;margin:0 auto;padding:0 24px 24px;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:12px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;}
.fbtn{padding:7px 16px;border-radius:8px;border:1px solid transparent;background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .15s;}
.fbtn:hover{color:var(--text);background:var(--bg3);}
.fbtn.active{background:var(--green-bg);border-color:var(--green-dim);color:var(--green);}
.search-input{flex:1;min-width:160px;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:'Noto Sans JP',sans-serif;padding:7px 12px;}
.search-input::placeholder{color:var(--text3);}
.filter-divider{width:1px;background:var(--border);margin:0 4px;}

/* SORT ROW */
.sort-row{max-width:900px;margin:0 auto;padding:0 24px 16px;display:flex;align-items:center;justify-content:space-between;}
.sort-label{font-size:12px;color:var(--text3);}
.sort-btns{display:flex;gap:4px;}
.sbtn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.sbtn.active{border-color:var(--green-dim);color:var(--green);background:var(--green-bg);}

/* PRODUCT GRID */
.grid{max-width:900px;margin:0 auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:48px;}

.prod-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;}
.prod-card:hover{border-color:var(--green-dim);transform:translateY(-2px);}
.prod-card.best-pick{border-color:var(--green);box-shadow:0 0 0 1px var(--green-dim);}

.card-img{height:180px;display:flex;align-items:center;justify-content:center;background:var(--bg3);position:relative;overflow:hidden;}
.card-img-placeholder{font-size:48px;opacity:.3;}
.card-rank{position:absolute;top:10px;left:10px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.05em;padding:3px 10px;border-radius:6px;background:rgba(13,13,11,.85);}
.rank-1{color:var(--amber);border:1px solid var(--amber);}
.rank-2{color:var(--text2);border:1px solid var(--border);}
.rank-3{color:#cd7f32;border:1px solid #cd7f32;}
.best-label{position:absolute;top:10px;right:10px;font-size:10px;padding:3px 9px;border-radius:99px;background:var(--green);color:#000;font-weight:700;}

.card-body{padding:14px;}
.card-cat{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.card-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:2px;line-height:1.4;}
.card-brand{font-size:11px;color:var(--text2);margin-bottom:10px;}

.price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:10px;}
.price-per-day{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--green);}
.price-per-day-unit{font-size:11px;color:var(--text3);}
.price-total{font-size:11px;color:var(--text3);margin-left:auto;}

.axes{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.ax{display:flex;align-items:center;gap:8px;}
.ax-name{font-size:10px;color:var(--text3);min-width:44px;}
.ax-bar{flex:1;height:3px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.ax-fill{height:100%;border-radius:99px;transition:width .4s;}

.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.ctag{font-size:10px;padding:2px 8px;border-radius:99px;}
.ctag-g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-dim);}
.ctag-r{background:var(--red-bg);color:var(--red);border:1px solid #5a1a1a;}
.ctag-a{background:var(--amber-bg);color:var(--amber);border:1px solid #5a3a0a;}

.honest-preview{font-size:12px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border);padding-top:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;padding:20px;overflow-y:auto;}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;max-width:600px;width:100%;margin:auto;}
.modal-header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.modal-close{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-close:hover{color:var(--text);}
.modal-img{height:200px;display:flex;align-items:center;justify-content:center;font-size:64px;opacity:.35;}
.modal-body{padding:0 24px 24px;}
.modal-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:2px;}
.modal-brand{font-size:12px;color:var(--text2);margin-bottom:16px;}

.modal-price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:20px;padding:12px 16px;background:var(--bg3);border-radius:10px;}
.modal-ppd{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--green);}
.modal-ppu{font-size:12px;color:var(--text3);}
.modal-ptotal{font-size:12px;color:var(--text3);margin-left:auto;}

.modal-sec{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;margin-top:20px;}
.modal-axes{display:flex;flex-direction:column;gap:8px;margin-bottom:4px;}
.modal-ax{display:flex;align-items:center;gap:10px;}
.modal-ax-name{font-size:12px;color:var(--text2);min-width:60px;}
.modal-ax-bar{flex:1;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.modal-ax-fill{height:100%;border-radius:99px;}
.modal-ax-val{font-size:11px;color:var(--text3);min-width:28px;text-align:right;}

.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px;}
.pc-box{background:var(--bg3);border-radius:10px;padding:12px;}
.pc-title{font-size:11px;font-weight:700;margin-bottom:8px;}
.pc-g .pc-title{color:var(--green);}
.pc-r .pc-title{color:var(--red);}
.pc-item{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:5px;line-height:1.5;}
.dot-g{width:4px;height:4px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:6px;}
.dot-r{width:4px;height:4px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:6px;}

.honest-full{font-size:13px;color:var(--text2);line-height:1.8;background:var(--bg3);border-radius:10px;padding:14px;border-left:3px solid var(--green);}

.fit-section{margin-top:4px;}
.fit-row{display:flex;flex-wrap:wrap;gap:5px;}

.avoid-box{background:var(--red-bg);border:1px solid #5a1a1a;border-radius:10px;padding:12px;margin-top:4px;}
.avoid-title{font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px;}
.avoid-body{font-size:12px;color:#c04040;line-height:1.6;}

/* DIAGNOSIS SECTION */
.diag-section{max-width:900px;margin:0 auto;padding:0 24px 60px;}
.diag-card{background:var(--bg2);border:1px solid var(--green-dim);border-radius:20px;padding:32px;}
.diag-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--green);margin-bottom:6px;}
.diag-sub{font-size:13px;color:var(--text2);margin-bottom:24px;}
.diag-prog{height:2px;background:var(--bg3);border-radius:99px;margin-bottom:24px;overflow:hidden;}
.diag-prog-fill{height:100%;background:var(--green);border-radius:99px;transition:width .35s;}
.diag-qlbl{font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.05em;}
.diag-q{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
.diag-qsub{font-size:12px;color:var(--text2);margin-bottom:18px;}
.diag-choices{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.dchoice{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .12s;text-align:left;font-family:'Noto Sans JP',sans-serif;}
.dchoice:hover{border-color:var(--green-dim);background:var(--green-bg);}
.dchoice.sel{border-color:var(--green);background:var(--green-bg);}
.dchoice-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.dchoice.sel .dchoice-dot{background:var(--green);border-color:var(--green);}
.dchoice-dot-in{width:6px;height:6px;border-radius:50%;background:#000;display:none;}
.dchoice.sel .dchoice-dot-in{display:block;}
.dchoice-lbl{font-size:13px;font-weight:500;color:var(--text);}
.dchoice-desc{font-size:11px;color:var(--text2);margin-top:1px;}
.diag-nav{display:flex;gap:8px;align-items:center;}
.dnext{padding:10px 24px;border-radius:8px;border:none;background:var(--green);color:#000;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:opacity .15s;}
.dnext:disabled{opacity:.3;cursor:default;}
.dback{padding:10px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.dback:hover{color:var(--text);}

.diag-result{animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.res-skin-badge{display:inline-flex;padding:6px 16px;border-radius:99px;font-size:13px;font-weight:700;margin-bottom:16px;}
.res-comment{font-size:13px;color:var(--text2);line-height:1.8;padding:14px;background:var(--bg3);border-radius:10px;border-left:3px solid var(--green);margin-bottom:20px;}
.res-products{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.res-prod{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:14px;}
.res-prod.top{border-color:var(--green);}
.res-prod-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.res-prod-name{font-size:13px;font-weight:700;color:var(--text);}
.res-prod-brand{font-size:11px;color:var(--text2);}
.res-prod-ppd{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);}
.res-prod-reason{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px;}
.res-best-badge{font-size:10px;background:var(--green);color:#000;padding:2px 9px;border-radius:99px;font-weight:700;margin-bottom:6px;display:inline-block;}
.res-avoid{background:var(--red-bg);border:1px solid #5a1a1a;border-radius:10px;padding:12px;margin-bottom:16px;}
.res-avoid-title{font-size:11px;font-weight:700;color:var(--red);margin-bottom:4px;}
.res-avoid-body{font-size:12px;color:#c04040;line-height:1.6;}
.res-actions{display:flex;gap:8px;flex-wrap:wrap;}
.ract{padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.ract:hover{color:var(--text);border-color:var(--green-dim);}
.ract-p{padding:9px 18px;border-radius:8px;border:1px solid var(--green-dim);background:var(--green-bg);color:var(--green);font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.ract-p:hover{background:var(--green-dim);}

/* SECTION HEADER */
.sec-header{max-width:900px;margin:0 auto;padding:40px 24px 20px;display:flex;align-items:baseline;justify-content:space-between;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em;}
.sec-count{font-size:12px;color:var(--text3);}

/* FOOTER */
footer{border-top:1px solid var(--border);padding:24px;text-align:center;font-size:11px;color:var(--text3);}
</style>
</head>

<div class="grid" id="product-grid"></div>

<div class="sec-header" id="diag">

    <div id="diag-area"></div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">

</div>

<footer>メンズ美容図鑑 — 正直なレビューだけ。広告案件は明記します。</footer>

let currentFilter='all', currentSort='rank', answers={}, dCur=0;

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}
function setSort(s,btn){
  currentSort=s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function renderCards(){
  const q=document.getElementById('search').value.toLowerCase();
  let list=products.filter(p=>{
    const matchF=currentFilter==='all'||p.filter.includes(currentFilter)||(currentFilter==='budget'&&p.pricePerDay<=30);
    const matchQ=!q||p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q);
    return matchF&&matchQ;
  });
  if(currentSort==='price') list=[...list].sort((a,b)=>a.pricePerDay-b.pricePerDay);
  else if(currentSort==='score') list=[...list].sort((a,b)=>b.score-a.score);
  else list=[...list].sort((a,b)=>a.rank-b.rank);

  document.getElementById('result-count').textContent=list.length+'製品';
  const grid=document.getElementById('product-grid');
  grid.innerHTML=list.map((p,i)=>{
    const isBest=p.rank===1;
    const rankClass=p.rank===1?'rank-1':p.rank===2?'rank-2':p.rank===3?'rank-3':'';
    const axes=p.axes.map(a=>`<div class="ax"><div class="ax-name">${a.n}</div><div class="ax-bar"><div class="ax-fill" style="width:${a.v}%;background:${a.c}"></div></div></div>`).join('');
    const tags=p.tags.map(t=>`<span class="ctag ${t.cls}">${t.t}</span>`).join('');
    return `<div class="prod-card${isBest?' best-pick':''}" onclick="openModal('${p.id}')" style="animation:fadeUp .3s ease ${i*0.05}s both">
      <div class="card-img">
        <div class="card-img-placeholder">${p.icon}</div>
        ${rankClass?`<div class="card-rank ${rankClass}">${p.rank===1?'BEST':p.rank===2?'2ND':'3RD'}</div>`:''}
        ${isBest?'<div class="best-label">最適解</div>':''}
      </div>
      <div class="card-body">
        <div class="card-cat">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="card-brand">${p.brand}</div>
        <div class="price-row">
          <div class="price-per-day">¥${p.pricePerDay}</div>
          <div class="price-per-day-unit">/日</div>
          <div class="price-total">参考¥${p.priceTotal.toLocaleString()}</div>
        </div>
        <div class="axes">${axes}</div>
        <div class="card-tags">${tags}</div>
        <div class="honest-preview">${p.honest}</div>
      </div>
    </div>`;
  }).join('');
}

  const goodTags=p.fitGood.map(t=>`<span class="ctag ctag-g">${t}</span>`).join('');
  const badTags=p.fitBad.map(t=>`<span class="ctag ctag-r">${t}</span>`).join('');
  const noteTags=p.fitNote.map(t=>`<span class="ctag ctag-a">${t}</span>`).join('');

    <div class="modal-img">${p.icon}</div>

        <div class="pc-box pc-g"><div class="pc-title">良いところ</div>${pros}</div>
        <div class="pc-box pc-r"><div class="pc-title">悪いところ</div>${cons}</div>

function closeModal(e){
  if(e&&e.target!==document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

// DIAGNOSIS
function renderDiag(i){
  const q=diagQs[i];
  document.getElementById('dprog').style.width=Math.round(i/diagQs.length*100)+'%';
  let html=`<div class="diag-qlbl">${q.lbl}</div><div class="diag-q">${q.q}</div><div class="diag-qsub">${q.sub}</div><div class="diag-choices">`;
  q.choices.forEach((c,idx)=>{
    const sel=answers[q.id]===c.val?' sel':'';
    html+=`<button class="dchoice${sel}" id="dc${idx}" onclick="dpick('${q.id}','${c.val}',${idx},${q.choices.length})">
      <div class="dchoice-dot"><div class="dchoice-dot-in"></div></div>
      <div><div class="dchoice-lbl">${c.lbl}</div><div class="dchoice-desc">${c.desc}</div></div>
    </button>`;
  });
  html+=`</div><div class="diag-nav">
    ${i>0?'<button class="dback" onclick="dback()">← 戻る</button>':''}
    <button class="dnext" id="dnxt" onclick="dnext()" ${answers[q.id]?'':'disabled'}>${i<diagQs.length-1?'次へ →':'結果を見る →'}</button>
  </div>`;
  document.getElementById('diag-area').innerHTML=html;
}

function dpick(qid,val,idx,total){
  answers[qid]=val;
  for(let i=0;i<total;i++) document.getElementById('dc'+i)?.classList.remove('sel');
  document.getElementById('dc'+idx)?.classList.add('sel');
  document.getElementById('dnxt').disabled=false;
}
function dnext(){ if(!answers[diagQs[dCur].id]) return; dCur++; if(dCur>=diagQs.length) showDiagResult(); else renderDiag(dCur); }
function dback(){ if(dCur>0){dCur--;renderDiag(dCur);} }

function getDiagRecs(){
  const t=answers.q1, trouble=answers.q2, texture=answers.q3, budget=answers.q4;
  if(t==='oily'||t==='combo'){
    if(trouble==='acne') return [{id:'acnes',best:true},{id:'melano',best:false}];
    if(trouble==='spot') return [{id:'melano',best:true},{id:'muji',best:false}];
    return [{id:'muji',best:true},{id:'acnes',best:false}];
  }
  if(t==='dry'){
    if(budget==='any'||budget==='high') return [{id:'ipsa',best:true},{id:'curel',best:false}];
    return [{id:'curel',best:true},{id:'hadlabo',best:false}];
  }
  if(trouble==='spot') return [{id:'melano',best:true},{id:'muji',best:false}];
  if(budget==='low') return [{id:'hadlabo',best:true},{id:'acnes',best:false}];
  return [{id:'curel',best:true},{id:'muji',best:false}];
}

  let html=`<div class="diag-result">
    <div style="font-size:11px;color:var(--text3);margin-bottom:8px;letter-spacing:.05em">診断結果</div>
    <div class="res-skin-badge" style="background:${sk.bg};color:${sk.col}">${sk.lbl}</div>
    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:8px">あなたの肌について正直に言うと</div>
    <div class="res-comment">${comment}</div>
    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px">おすすめ化粧水（正直レビュー付き）</div>
    <div class="res-products">`;

  recs.forEach(r=>{
    const p=products.find(x=>x.id===r.id);
    if(!p) return;
    html+=`<div class="res-prod${r.best?' top':''}">
      ${r.best?'<div class="res-best-badge">この肌タイプへの最適解</div>':''}
      <div class="res-prod-head">
        <div><div class="res-prod-name">${p.name}</div><div class="res-prod-brand">${p.brand}</div></div>
        <div><div class="res-prod-ppd">¥${p.pricePerDay}<span style="font-size:11px;color:var(--text3);font-family:'Noto Sans JP'">/日</span></div></div>
      </div>
      <div class="res-prod-reason">${p.honest.substring(0,80)}...</div>
      <div class="card-tags" style="margin-top:6px">${p.tags.map(t=>`<span class="ctag ${t.cls}">${t.t}</span>`).join('')}</div>
      <button onclick="openModal('${p.id}')" style="margin-top:8px;padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;">正直レビューを全部見る →</button>
    </div>`;
  });

  const avoidId=recs[0].id==='hadlabo'?'acnes':recs[0].id==='acnes'?'hadlabo':'hadlabo';
  const av=products.find(x=>x.id===avoidId);
  html+=`</div>
    <div class="res-avoid">
      <div class="res-avoid-title">あなたの肌タイプが避けるべき</div>
      <div class="res-avoid-body"><strong>${av.name}</strong>：${answers.q1==='oily'||answers.q1==='combo'?'保湿力が強すぎて脂性肌にはテカリを悪化させるリスクがある。コスパも悪くなる。':'洗浄力が強く乾燥肌のバリア機能を壊すリスクがある。価格が安くても逆効果。'}</div>
    </div>
    <div class="res-actions">
      <button class="ract" onclick="drestart()">← もう一度診断する</button>
      <button class="ract-p" onclick="setFilter('${answers.q1==='oily'||answers.q1==='combo'?'oily':'dry'}',document.querySelector('.fbtn'))">診断結果で絞り込む →</button>
    </div>
  </div>`;
  document.getElementById('diag-area').innerHTML=html;
}

function drestart(){ answers={};dCur=0;document.getElementById('dprog').style.width='0%';renderDiag(0); }

renderCards();
renderDiag(0);
</script>
<style>
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</body>
</html>
