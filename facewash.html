let curF='all',curS='rank',answers={},dCur=0;

function setF(f,btn){curF=f;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function setS(s,btn){curS=s;document.querySelectorAll('.sb').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}

function render(){
  const q=document.getElementById('srch').value.toLowerCase();
  let list=prods.filter(p=>{
    const mf=curF==='all'||p.filter.includes(curF)||(curF==='budget'&&p.ppd<=20);
    const mq2=!q||p.name.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q);
    return mf&&mq2;
  });
  if(curS==='price') list=[...list].sort((a,b)=>a.ppd-b.ppd);
  else if(curS==='score') list=[...list].sort((a,b)=>b.score-a.score);
  else list=[...list].sort((a,b)=>a.rank-b.rank);
  document.getElementById('rcnt').textContent=list.length+'製品';
  document.getElementById('grid').innerHTML=list.map((p,i)=>{
    const ib=p.rank===1;
    const rc=p.rank===1?'r1':p.rank===2?'r2':p.rank===3?'r3':'';
    const axes=p.axes.map(a=>`<div class="pax"><div class="paxn">${a.n}</div><div class="paxb"><div class="paxf" style="width:${a.v}%;background:${a.c}"></div></div></div>`).join('');
    const tags=p.tags.map(t=>`<span class="pt ${t.cls}">${t.t}</span>`).join('');
    return `<div class="pc${ib?' best':''}" onclick="openM('${p.id}')" style="animation:fadeU .3s ${i*.05}s ease both">
      <div class="pi">
        <div class="pi-ico">${p.ico}</div>
        ${rc?`<div class="pr ${rc}">${p.rank===1?'BEST':p.rank===2?'2ND':'3RD'}</div>`:''}
        ${ib?'<div class="bl">最適解</div>':''}
      </div>
      <div class="pb">
        <div class="pcat">${p.cat}</div>
        <div class="pname">${p.name}</div>
        <div class="pbrand">${p.brand}</div>
        <div class="pprow"><span class="ppd">¥${p.ppd}</span><span class="ppu">/日</span><span class="ptot">参考¥${p.ptot.toLocaleString()}</span></div>
        <div class="paxes">${axes}</div>
        <div class="ptags">${tags}</div>
        <div class="phon">${p.honest}</div>
      </div>
    </div>`;
  }).join('');
}

function openM(id){
  const p=prods.find(x=>x.id===id);
  if(!p)return;
  const axes=p.axes.map(a=>`<div class="max"><div class="maxn">${a.n}</div><div class="maxb"><div class="maxf" style="width:${a.v}%;background:${a.c}"></div></div><div class="maxv">${a.v}</div></div>`).join('');
  const pros=p.pros.map(x=>`<div class="pci"><div class="dg"></div><div>${x}</div></div>`).join('');
  const cons=p.cons.map(x=>`<div class="pci"><div class="dr"></div><div>${x}</div></div>`).join('');
  const gt=p.fitGood.map(t=>`<span class="pt pt-g">${t}</span>`).join('');
  const rt=p.fitBad.map(t=>`<span class="pt pt-r">${t}</span>`).join('');
  const nt=p.fitNote.map(t=>`<span class="pt pt-a">${t}</span>`).join('');
  document.getElementById('mi').innerHTML=`
    <div class="mh"><button class="mcls" onclick="closeM()">✕</button></div>
    <div class="mimg">${p.ico}</div>
    <div class="mbody">
      <div class="mname">${p.name}</div>
      <div class="mbrand">${p.brand} ／ ${p.cat}</div>
      <div class="mpr"><div class="mppd">¥${p.ppd}</div><div class="mppu">/日</div><div class="mptot">参考¥${p.ptot.toLocaleString()}</div></div>
      <div class="msec">評価軸</div><div class="maxes">${axes}</div>
      <div class="msec">正直コメント</div><div class="mhon">${p.honest}</div>
      <div class="msec">良いところ / 悪いところ</div>
      <div class="pc2"><div class="pcb pg"><div class="pct">良いところ</div>${pros}</div><div class="pcb pr2"><div class="pct">悪いところ</div>${cons}</div></div>
      <div class="msec">向いてる人 / 向いてない人</div>
      <div class="mftags">${gt}${rt}${nt}</div>
      ${p.avoid?`<div class="msec" style="margin-top:16px">避けるべき人への警告</div><div class="mavoid"><div class="mavt">この製品を避けるべき人</div><div class="mavb">${p.avoid}</div></div>`:''}
    </div>`;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeM(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}

function renderD(i){
  const q=dqs[i];
  document.getElementById('dpf').style.width=Math.round(i/dqs.length*100)+'%';
  let h=`<div class="dqlbl">${q.lbl}</div><div class="dq">${q.q}</div><div class="dqsub">${q.sub}</div><div class="dchoices">`;
  q.ch.forEach((c,idx)=>{
    const s=answers[q.id]===c.v?' sel':'';
    h+=`<button class="dch${s}" id="dc${idx}" onclick="dpick('${q.id}','${c.v}',${idx},${q.ch.length})"><div class="ddot"><div class="ddotin"></div></div><div><div class="dlbl">${c.l}</div><div class="ddesc">${c.d}</div></div></button>`;
  });
  h+=`</div><div class="dnav">${i>0?'<button class="dbk" onclick="dbk()">← 戻る</button>':''}<button class="dnxt" id="dnxt" onclick="dnxt()" ${answers[q.id]?'':'disabled'}>${i<dqs.length-1?'次へ →':'結果を見る →'}</button></div>`;
  document.getElementById('da').innerHTML=h;
}
function dpick(qid,v,idx,total){answers[qid]=v;for(let i=0;i<total;i++)document.getElementById('dc'+i)?.classList.remove('sel');document.getElementById('dc'+idx)?.classList.add('sel');document.getElementById('dnxt').disabled=false;}
function dnxt(){if(!answers[dqs[dCur].id])return;dCur++;if(dCur>=dqs.length)showDRes();else renderD(dCur);}
function dbk(){if(dCur>0){dCur--;renderD(dCur);}}

function getDRecs(){
  const t=answers.q1,tr=answers.q2,budget=answers.q5;
  if(t==='oily'||t==='combo'){
    if(tr==='acne') return [{id:'acne',best:true},{id:'biore',best:false}];
    if(budget==='low') return [{id:'biore',best:true},{id:'labolabo',best:false}];
    return [{id:'labolabo',best:true},{id:'biore',best:false}];
  }
  if(t==='dry'){
    if(budget==='any'||budget==='high') return [{id:'orbis',best:true},{id:'curel',best:false}];
    return [{id:'curel',best:true},{id:'facy',best:false}];
  }
  if(tr==='sensitive') return [{id:'minon',best:true},{id:'curel',best:false}];
  if(budget==='low') return [{id:'biore',best:true},{id:'labolabo',best:false}];
  return [{id:'labolabo',best:true},{id:'hadlabo_f',best:false}];
}

  const t=answers.q1;

  return {l:'普通肌',bg:'#0d2b1c',c:'#3dd68c'};
}

  const t=answers.q1;
  if(t==='oily') return 'テカリ・皮脂過多が主な悩み。「洗浄力が強い=良い洗顔」ではなく、皮脂を落としすぎると逆に皮脂分泌が増える。1日2回をしっかり守ること。';

}
